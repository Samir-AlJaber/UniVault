name: CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js (FIXED: removed cache)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # FRONTEND (client)
      # =========================
      - name: Install frontend dependencies
        working-directory: client
        run: npm install

      - name: Build frontend
        working-directory: client
        run: npm run build

      # =========================
      # BACKEND (server)
      # =========================
      - name: Install backend dependencies
        working-directory: server
        run: npm install

      - name: Run backend tests (if exist)
        working-directory: server
        run: npm test || echo "No tests found"
